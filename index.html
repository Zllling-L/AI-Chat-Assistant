<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI对话助手</title>
    
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <h2>开发者：郑泽琳  学号：423830229</h2>
    <h3>真实大模型对话 </h3>
    <div>
        <input type="text" id="userInput" style="width:520px;height:38px;font-size:16px;" placeholder="输入问题">
        <button onclick="chatAI()" style="height:42px;font-size:15px;">发送</button>
    </div>
    <div style="margin-top:20px;padding:16px;border:1px solid #999;width:540px;min-height:180px;white-space:pre-wrap;">
        <strong>AI回复：</strong><br>
        <span id="aiRes">等待提问...</span>
    </div>
    <script>
        
        let temp = 0.7;
        async function chatAI(){
            let question = document.getElementById("userInput").value.trim();
            let resDom = document.getElementById("aiRes");
            if(!question){resDom.innerText="请输入内容";return;}
            resDom.innerText = "AI思考中...";
            try{
                let ans = await puter.ai.chat(question,{temperature:temp});
                resDom.innerText = `temp参数=${temp}\n${ans}`;
            }catch(err){
                resDom.innerText="服务短暂繁忙，重新发送即可";
            }
        }
    </script>
</body>
</html>
